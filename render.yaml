services:
  - type: web
    name: swiftinvoice
    runtime: php
    runtimeVersion: 8.1
    buildCommand: composer install --no-dev
    startCommand: php -S 0.0.0.0:${PORT:-8080}
    plan: free
    envVars:
      - key: DB_HOST
        value: localhost
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: password
      - key: DB_NAME
        value: swiftinvoice_db
